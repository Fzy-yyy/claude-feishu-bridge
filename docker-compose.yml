version: '3.8'

services:
  claude-feishu-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-feishu-bridge
    restart: unless-stopped

    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - CLAUDE_CODE_GIT_BASH_PATH=/usr/bin/bash

    # 挂载配置文件和数据目录
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - ./work:/app/work  # Claude 工作目录

    # 网络模式
    network_mode: bridge

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # 健康检查（可选）
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
